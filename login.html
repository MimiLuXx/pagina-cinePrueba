<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <!-- Barra superior con logo, nombre del cine y opción de contacto -->
        <div class="top-bar">
            <div class="logo">
                <img src="dinomo.png" alt="Logo de Cine-Saurus" />
            </div>
            <h1 class="site-title">Cine-Saurus</h1>
            <div class="contact-link">
                <a href="contacto.html">Contáctanos</a>
            </div>
        </div>

        <!-- Barra de navegación -->
        <nav class="navbar">
            <a href="index.html">Inicio</a>
            <a href="peliculas.html">Películas</a>
            <a href="sede.html">Sede</a>
            <a href="promociones.html">Promociones</a>
            <a href="socio.html">Socio</a>
            <a href="dulceria.html">Dulcería</a>
            <a href="corporativo.html">Corporativo (Admin)</a>
        </nav>
    </header>

    <!-- Contenido principal de la página de inicio de sesión -->
    <main>
        <h1>Iniciar Sesión</h1>
        <form action="procesar_login.html" method="POST">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit">Iniciar Sesión</button>
        </form>
        <p>¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
    </main>
</body>
</html>
